apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deployer

# Reusable application deployer, called by the staged release workflows.
# Decides from the release manifest whether to deploy, then calls the
# component's simulated deploy workflow in the component repo.
#
# Manifest structure (system-generated by CloudBees Unify on release):
#   manifest["<component-name>"]["<artifact-name>"].{ deploy, version, url, id, ... }
# The <component-name> is the connected repo/component name — here
# "cloudbees-unify-demo-kit". If you fork to a different repo/component name,
# update the top-level key below (and the cross-repo uses path).

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      manifest:
        type: string
        required: true

jobs:
  orders-api:
    if: ${{ fromJSON(inputs.manifest)['cloudbees-unify-demo-kit']['orders-api'].deploy }}
    uses: cb-demos/cloudbees-unify-demo-kit/.cloudbees/workflows/deploy.yaml@main
    with:
      artifact-id: ${{ fromJSON(inputs.manifest)['cloudbees-unify-demo-kit']['orders-api'].url }}
      environment: ${{ inputs.environment }}
