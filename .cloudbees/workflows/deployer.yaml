apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deployer

# Reusable application deployer, called by the staged release workflows.
# For the single demo component (orders-api) it decides from the manifest
# whether to deploy, then calls that component's simulated deploy workflow
# in the component repo.
#
# NOTE: cross-repo reusable-workflow reference uses owner/repo/path@ref.
# Update the repo path / @main if you forked elsewhere.

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      manifest:
        type: string
        required: true

jobs:
  orders-api:
    if: ${{ fromJSON(inputs.manifest)['orders-api']['orders-api'].deploy }}
    uses: cb-demos/cloudbees-unify-demo-kit/.cloudbees/workflows/deploy.yaml@main
    with:
      artifact-id: ${{ fromJSON(inputs.manifest)['orders-api']['orders-api'].id }}
      environment: ${{ inputs.environment }}
