apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: finsure-bank-regulated-release

# Regulated release orchestration for FinSure Bank — a STAGED workflow.
# Deploy stages map to environments and call the reusable deployer, which
# simulates deploying each component. Governance/validation/approval/evidence
# jobs run mock steps and publish evidence to the run's Evidence tab.
#
# Setup in CloudBees Unify: the target environments (staging, prod) must exist
# and be associated with the application, and the component must be part of the
# application. Deploys are simulated (no real cluster).

on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
        default: '{"orders-api":{"orders-api":{"deploy":true,"id":"orders-api:1.4.0"}}}'
      change_ticket:
        type: string
        default: CHG-10482
      release_window:
        type: string
        default: Saturday 22:00-23:00 ET

metadata:
  stages/v1alpha1:
    - name: Governance
      jobs:
        - governance-review
    - name: Staging
      jobs:
        - deploy-staging
        - staging-validation
    - name: Production Approval
      jobs:
        - production-approval
    - name: Production
      jobs:
        - deploy-production
    - name: Post-Release
      jobs:
        - release-evidence

jobs:
  governance-review:
    steps:
      - name: Validate audit evidence
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== FinSure Bank governance review =="
          echo "Change ticket:  ${{ inputs.change_ticket }}"
          echo "Release window: ${{ inputs.release_window }}"
          echo "Verifying unit tests, security scans, and approvals..."
          echo "Audit evidence: COMPLETE"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Governance review — FinSure Bank
            - Change ticket: ${{ inputs.change_ticket }}
            - Release window: ${{ inputs.release_window }}
            - Unit tests / security scans / approvals: verified
            - Audit evidence: **complete**

  deploy-staging:
    needs:
      - governance-review
    environment: staging
    uses: ./.cloudbees/workflows/deployer.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: ${{ job.environment }}

  staging-validation:
    needs:
      - deploy-staging
    steps:
      - name: Run smoke tests and release checks
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Running smoke tests..."
          echo "Checking SLO dashboards..."
          echo "Validating audit controls..."
          echo "Staging validation: PASSED"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Staging validation
            - Smoke tests: passed
            - SLO dashboards: within thresholds
            - Audit controls: validated
            - Status: **passed**

  production-approval:
    needs:
      - staging-validation
    steps:
      - name: Production approval (demo talking point)
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "TALKING POINT: add a manual approval gate here in the CloudBees Unify Workflow Composer."
          echo "Suggested approvers: Release Manager, Security, Application Owner"
          echo "Approval: SIMULATED / APPROVED"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Production approval
            - Approvers: Release Manager, Security, Application Owner
            - Change ticket: ${{ inputs.change_ticket }}
            - Decision: **approved** (simulated for demo)

  deploy-production:
    needs:
      - production-approval
    environment: prod
    uses: ./.cloudbees/workflows/deployer.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: ${{ job.environment }}

  release-evidence:
    needs:
      - deploy-production
    steps:
      - name: Publish release summary
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== Release evidence package =="
          echo "Change ticket: ${{ inputs.change_ticket }}"
          echo "Release COMPLETE for FinSure Bank"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Release evidence package — FinSure Bank
            | Control | Status |
            | --- | --- |
            | Unit tests | passed |
            | Security scan | passed |
            | Change approval | complete |
            | Staging validation | passed |
            | Production approval | approved |
            | Change ticket | ${{ inputs.change_ticket }} |

            Release: **COMPLETE**
